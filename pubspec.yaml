name: sekka
description: "سِكّة — تطبيق إدارة مهام الديليفري الذكي"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI & Design
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.17
  shimmer: ^3.0.0
  iconsax_plus: ^1.0.0

  # Navigation
  go_router: ^14.8.1

  # State Management (BLoC)
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7

  # Local Storage
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^9.2.4

  # Network
  dio: ^5.8.0+1

  # Location
  geolocator: ^13.0.2
  url_launcher: ^6.3.1

  # Camera & Media
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0

  # Real-time (SignalR)
  signalr_netcore: ^1.3.7

  # Text-to-Speech
  flutter_tts: ^4.2.0

  # File System
  path_provider: ^2.1.5

  # Utils
  intl: ^0.20.2
  uuid: ^4.5.1
  permission_handler: ^11.4.0
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  http: ^1.6.0
  image_cropper: ^12.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/app_icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/vehicles/
    - assets/icons/

  fonts:
    - family: Tajawal
      fonts:
        - asset: assets/fonts/Tajawal-Light.ttf
          weight: 300
        - asset: assets/fonts/Tajawal-Regular.ttf
          weight: 400
        - asset: assets/fonts/Tajawal-Medium.ttf
          weight: 500
        - asset: assets/fonts/Tajawal-Bold.ttf
          weight: 700
        - asset: assets/fonts/Tajawal-ExtraBold.ttf
          weight: 800
